# ╔══════════════════════════════════════════════╗
# ║           CoreSquid v1.0.0                   ║
# ║     Professional Squid Game Plugin           ║
# ╚══════════════════════════════════════════════╝

# Language: es (Spanish) or en (English)
language: es

# Server IP shown in scoreboard
server-ip: "play.colombiacraft.fun"

# ─── GAME SETTINGS ────────────────────────────────────────────────
game:
  min-players: 2
  max-players: 16
  lobby-countdown: 30        # seconds to wait in lobby before starting
  between-games-delay: 10    # seconds between minigames
  starting-titles: true      # show 3,2,1 countdown titles
  announce-games: true       # announce each minigame with title

# ─── SCOREBOARD ───────────────────────────────────────────────────
scoreboard:
  enabled: true
  # Show scoreboard to ALL players (even outside game)
  always-visible: true
  update-interval: 20        # ticks between scoreboard updates (20 = 1s)
  title: "&c&lSQUID GAME"

  # Lines shown when player is NOT in a game
  global-lines:
    - "&7"
    - "&7Estado: &e{state}"
    - "&7"
    - "&7Jugadores en juego: &e{playing}"
    - "&7En lobby: &e{lobby}"
    - "&7"
    - "&6{server-ip}"
    - "&7"

  # Lines shown when player IS in lobby
  lobby-lines:
    - "&7"
    - "&7Estado: &aEn Lobby"
    - "&7"
    - "&7Jugadores: &e{players}/{max}"
    - "&7Iniciando en: &e{countdown}s"
    - "&7"
    - "&6{server-ip}"
    - "&7"

  # Lines shown during a game
  game-lines:
    - "&7"
    - "&7Juego: &e{game}"
    - "&7Tiempo: &e{time}"
    - "&7"
    - "&7Jugadores: &e{alive}"
    - "&7Eliminados: &c{eliminated}"
    - "&7"
    - "&6{server-ip}"
    - "&7"

# ─── SOUNDS ───────────────────────────────────────────────────────
sounds:
  enabled: true
  use-custom-sounds: false   # set true after installing resource pack

# ─── REWARDS ──────────────────────────────────────────────────────
rewards:
  enabled: true
  money: 500
  commands:
    - "give {player} diamond 3"
  items: []

# ─── RESOURCE PACK ────────────────────────────────────────────────
resourcepack:
  enabled: false
  url: ""
  hash: ""
  required: false            # force players to use resource pack

# ─── ARENA GENERATION ─────────────────────────────────────────────
arenas:
  # World where arenas are built
  world: "world"
  # Base coordinates for arena generation (change if conflicts)
  origin-x: 10000
  origin-y: 100
  origin-z: 10000
  # Use custom arena (set with /squid arena create) instead of auto-gen
  use-custom: false

# ─── MINIGAMES ENABLED ────────────────────────────────────────────
minigames:
  red-light-green-light: true
  glass-bridge: true
  marbles: true
  tug-of-war: true
  dalgona: true
  musical-chairs: true
  maze: true
  hot-potato: true
  memory-blocks: true
  obstacle-course: true
  falling-platforms: true
  guess-number: true
  hide-seek: true
  king-hill: true
  russian-roulette: true

# ─── MINIGAME SETTINGS ────────────────────────────────────────────
minigame-settings:
  red-light-green-light:
    duration: 90
    move-threshold: 0.15     # max movement allowed in red light

  glass-bridge:
    duration: 120
    columns: 18

  marbles:
    duration: 60
    starting-marbles: 10
    max-guesses: 5

  musical-chairs:
    duration: 120
    music-duration-min: 5
    music-duration-max: 12

  maze:
    duration: 120
    size: 20

  hot-potato:
    duration: 90
    min-fuse: 5
    max-fuse: 15

  memory-blocks:
    duration: 120
    colors: 6

  obstacle-course:
    duration: 120
    length: 50

  falling-platforms:
    duration: 90
    levels: 4
    fall-interval: 3         # seconds between platform removals

  guess-number:
    duration: 60
    max: 100
    max-attempts: 7

  hide-seek:
    duration: 90
    hide-time: 10            # seconds for hiders to hide

  king-hill:
    duration: 120
    points-to-win: 30

  russian-roulette:
    duration: 120
    death-chance: 1          # 1 in X chance of death

  dalgona:
    duration: 120
    shape: circle            # circle, triangle, star, umbrella

  tug-of-war:
    duration: 60
    win-distance: 10
